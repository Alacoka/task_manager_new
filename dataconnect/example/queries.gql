# dataconnect/queries.gql

# Lista todas as tarefas de um utilizador específico, da mais recente para a mais antiga
query ListUserTasks($userId: String!) @auth(level: USER) {
  tasks(
    where: { userId: { eq: $userId } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    title
    completed
    createdAt
  }
}