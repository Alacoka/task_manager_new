# Criar tarefa agora aceita categoria e prazo (opcionais)
mutation CreateTask($title: String!, $userId: String!, $category: String, $dueDate: Date) @auth(level: USER) {
  task_insert(data: {
    title: $title,
    userId: $userId,
    category: $category,
    dueDate: $dueDate
  })
}

# NOVA MUTAÇÃO: Para editar uma tarefa que já existe
mutation UpdateTask($id: UUID!, $title: String, $category: String, $dueDate: Date) @auth(level: USER) {
  task_update(
    id: $id, 
    data: { 
      title: $title,
      category: $category,
      dueDate: $dueDate
    }
  )
}

# (Mantenha o ToggleTask e DeleteTask que já estavam aí)
mutation ToggleTask($id: UUID!, $completed: Boolean!) @auth(level: USER) {
  task_update(
    id: $id, 
    data: { completed: $completed }
  )
}

mutation DeleteTask($id: UUID!) @auth(level: USER) {
  task_delete(id: $id)
}